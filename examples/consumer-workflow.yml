# Example: drop this file at .github/workflows/agent.yml in any consumer repo.
#
# Triggers the nightcrawler coding agent whenever an issue is labeled
# `agent-ready` (or whatever label you choose). The agent runs on a
# self-hosted runner pre-authed against a Claude Max subscription (1-year
# OAuth token from `claude setup-token`), implements the issue, runs your
# verification command, opens a draft PR, and comments on the issue.
#
# Setup checklist on the runner VM (one-time):
#   1. Install Node 24+ and the Claude CLI:
#        npm install -g @anthropic-ai/claude-code
#   2. Make sure `gh` and `jq` are on the PATH.
#   3. Mint a long-lived subscription token on a workstation:
#        claude setup-token
#      Put the resulting `sk-ant-oat-...` token in the runner process env
#      as CLAUDE_CODE_OAUTH_TOKEN (e.g. via docker-compose env_file or
#      systemd EnvironmentFile). The action picks it up automatically —
#      no workflow-level env: block is needed.
#
# Bedrock alternative: if you'd rather bill via AWS Bedrock, set
# `use-bedrock: 'true'` + `use-subscription: 'false'` on the action and pass
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION via the step's
# env: block from secrets. See action.yml for details.

name: Coding Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  # One agent per issue at a time; multiple issues serialize on the runner.
  group: nightcrawler-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  agent:
    if: github.event.label.name == 'agent-ready'
    runs-on: [self-hosted, linux, gcp]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # we branch from main; need full history

      - name: Setup pnpm + node (consumer-specific — adjust to your stack)
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Run nightcrawler
        uses: grossolabs/nightcrawler@v1
        with:
          issue-number: ${{ github.event.issue.number }}
          use-subscription: 'true'
          model: 'sonnet'                      # or 'opus' for hard issues
          max-turns: '30'
          max-retries: '3'
          agent-guide-path: '.github/AGENT_GUIDE.md'
          verify-command: |
            pnpm install --frozen-lockfile
            pnpm -r --if-present build
            pnpm -r --if-present lint:ci
            pnpm -r --if-present test
