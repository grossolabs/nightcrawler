# Example: drop this file at .github/workflows/agent.yml in any consumer repo.
#
# Triggers the nightcrawler coding agent whenever an issue is labeled
# `agent-ready` (or whatever label you choose). The agent runs on a
# self-hosted runner, routes Claude requests through AWS Bedrock, implements
# the issue, runs your verification command, opens a draft PR, and comments
# on the issue.
#
# Setup checklist on the runner VM (one-time):
#   1. Install Node 24+ and the Claude CLI:
#        npm install -g @anthropic-ai/claude-code
#   2. Make sure `gh` and `jq` are on the PATH.
#   3. Add these repository secrets (Settings → Secrets → Actions):
#        AWS_ACCESS_KEY_ID      — IAM key with bedrock:InvokeModel on Claude models
#        AWS_SECRET_ACCESS_KEY  — corresponding secret
#      Optional: AWS_SESSION_TOKEN if using temporary credentials.

name: Coding Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  # One agent per issue at a time; multiple issues serialize on the runner.
  group: nightcrawler-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  agent:
    if: github.event.label.name == 'agent-ready'
    runs-on: [self-hosted, linux, gcp]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # we branch from main; need full history

      - name: Setup pnpm + node (consumer-specific — adjust to your stack)
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Run nightcrawler
        uses: grossolabs/nightcrawler@v1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1                # Bedrock region where Claude models are enabled
          # AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}  # uncomment for temporary creds
        with:
          issue-number: ${{ github.event.issue.number }}
          use-bedrock: 'true'
          use-subscription: 'false'
          model: 'sonnet'                      # or 'opus' for hard issues
          max-turns: '30'
          max-retries: '3'
          agent-guide-path: '.github/AGENT_GUIDE.md'
          verify-command: |
            pnpm install --frozen-lockfile
            pnpm -r --if-present build
            pnpm -r --if-present lint:ci
            pnpm -r --if-present test
