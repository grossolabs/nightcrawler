name: 'Nightcrawler — Headless Coding Agent'
description: 'Turns labeled GitHub issues into draft PRs by running Claude Code in headless mode on a self-hosted runner.'
author: 'grossolabs'
branding:
  icon: 'moon'
  color: 'purple'

inputs:
  issue-number:
    description: 'GitHub issue number to implement.'
    required: true
  use-subscription:
    description: 'true: bill against a Claude Max subscription. Auth via `CLAUDE_CODE_OAUTH_TOKEN` env (preferred — long-lived 1-year token from `claude setup-token`) OR cached `claude /login` credentials at $HOME/.claude/.credentials.json (legacy — 1-hour expiry, brittle on headless). false: requires ANTHROPIC_API_KEY env on the calling job (pay-per-token API console billing).'
    required: false
    default: 'true'
  model:
    description: 'Claude model. Use `sonnet` (default), `opus`, or a full model id like `claude-opus-4-7`.'
    required: false
    default: 'sonnet'
  max-turns:
    description: 'Maximum agent turns per attempt before forced stop.'
    required: false
    default: '30'
  max-retries:
    description: 'How many times to retry the agent if a run produces no changes or fails verification. Each retry resets to the original branch tip via `git reset --hard`.'
    required: false
    default: '3'
  label-progress:
    description: 'Label applied to the issue while the agent is working.'
    required: false
    default: 'nightcrawler:in-progress'
  label-solved:
    description: 'Label applied to the issue when the agent opens a PR.'
    required: false
    default: 'nightcrawler:solved'
  label-failed:
    description: 'Label applied to the issue when the agent gives up.'
    required: false
    default: 'nightcrawler:failed'
  agent-guide-path:
    description: 'Path inside the consumer repo to the AGENT_GUIDE.md the agent must follow.'
    required: false
    default: '.github/AGENT_GUIDE.md'
  verify-command:
    description: 'Optional shell command run AFTER the agent finishes and BEFORE the commit. Non-zero exit aborts the commit. Example: `pnpm install --frozen-lockfile && pnpm -r lint:ci && pnpm -r test`.'
    required: false
    default: ''
  branch-prefix:
    description: 'Prefix for the branch the agent pushes to. The full branch name will be `<prefix><issue-number>-<slug>`.'
    required: false
    default: 'agent/issue-'
  draft-pr:
    description: 'Open the PR as draft (recommended).'
    required: false
    default: 'true'
  base-branch:
    description: 'Branch the agent branches off and the PR targets.'
    required: false
    default: 'main'
  allowed-tools:
    description: 'Comma-separated tool allowlist passed to `claude --allowed-tools`.'
    required: false
    default: 'Bash,Read,Write,Edit,Grep,Glob'
  agent-author-name:
    description: 'git user.name used for the commit.'
    required: false
    default: 'nightcrawler[bot]'
  agent-author-email:
    description: 'git user.email used for the commit.'
    required: false
    default: 'nightcrawler@users.noreply.github.com'
  use-bedrock:
    description: 'Set to true to route Claude requests through AWS Bedrock instead of the Anthropic API. Requires AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION on the runner (set via secrets + env: in the calling job).'
    required: false
    default: 'false'

outputs:
  branch:
    description: 'Name of the branch the agent pushed to (empty on no-op).'
    value: ${{ steps.run.outputs.branch }}
  pr-url:
    description: 'URL of the opened PR (empty on no-op or failure before PR open).'
    value: ${{ steps.run.outputs.pr_url }}
  status:
    description: 'success | no-changes | verify-failed | error'
    value: ${{ steps.run.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Install Claude Code CLI
      shell: bash
      run: |
        if ! command -v claude >/dev/null 2>&1; then
          npm install -g @anthropic-ai/claude-code@latest
        fi
        claude --version

    - name: Validate auth
      shell: bash
      env:
        USE_SUBSCRIPTION: ${{ inputs.use-subscription }}
        USE_BEDROCK: ${{ inputs.use-bedrock }}
      run: |
        if [ "$USE_BEDROCK" = "true" ] || [ "$USE_BEDROCK" = "1" ]; then
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::use-bedrock=true but AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY is not set. Pass them via the calling job's env: block (e.g. from secrets)."
            exit 1
          fi
          echo "Bedrock auth via AWS credentials (region: ${AWS_REGION:-us-east-1})."
        elif [ "$USE_SUBSCRIPTION" = "true" ]; then
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "Subscription auth via CLAUDE_CODE_OAUTH_TOKEN env (1-year token from \`claude setup-token\`)."
          elif [ -f "$HOME/.claude/.credentials.json" ] || [ -f "$HOME/.config/claude/credentials.json" ]; then
            echo "Subscription auth via cached \`claude /login\` credentials. Note: this path expires every ~1h on headless runners; prefer CLAUDE_CODE_OAUTH_TOKEN (\`claude setup-token\`) for CI."
          else
            echo "::error::use-subscription=true but neither CLAUDE_CODE_OAUTH_TOKEN env nor cached credentials are present. Run \`claude setup-token\` on a workstation and set the resulting token as CLAUDE_CODE_OAUTH_TOKEN on the runner."
            exit 1
          fi
        else
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::use-subscription=false but ANTHROPIC_API_KEY is not set in the calling job's env."
            exit 1
          fi
        fi

    - name: Run agent
      id: run
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        USE_SUBSCRIPTION: ${{ inputs.use-subscription }}
        AGENT_MODEL: ${{ inputs.model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        MAX_RETRIES: ${{ inputs.max-retries }}
        AGENT_GUIDE_PATH: ${{ inputs.agent-guide-path }}
        VERIFY_COMMAND: ${{ inputs.verify-command }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        DRAFT_PR: ${{ inputs.draft-pr }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        ALLOWED_TOOLS: ${{ inputs.allowed-tools }}
        AGENT_AUTHOR_NAME: ${{ inputs.agent-author-name }}
        AGENT_AUTHOR_EMAIL: ${{ inputs.agent-author-email }}
        LABEL_PROGRESS: ${{ inputs.label-progress }}
        LABEL_SOLVED: ${{ inputs.label-solved }}
        LABEL_FAILED: ${{ inputs.label-failed }}
        GH_TOKEN: ${{ github.token }}
        CLAUDE_CODE_USE_BEDROCK: ${{ inputs.use-bedrock == 'true' && '1' || '' }}
        # CLAUDE_CODE_OAUTH_TOKEN, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
        # AWS_SESSION_TOKEN, and AWS_REGION are intentionally NOT declared here
        # — see validate-auth step for the rationale. Bash inherits process env,
        # so `claude` invoked by run-agent.sh will see them if present on the
        # runner (e.g. via docker-compose env_file or secrets passed in the
        # calling job's env: block).
      run: bash ${{ github.action_path }}/scripts/run-agent.sh
